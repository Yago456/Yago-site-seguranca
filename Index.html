<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas Seguras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🔐 Gerador de Senhas Seguras</h1>

    <div class="senha-box">
        <input type="text" id="senha" readonly>
        <button id="copiar">Copiar</button>
    </div>

    <label>
        Tamanho:
        <span id="tamanhoValor">16</span>
    </label>

    <input type="range" id="tamanho" min="8" max="64" value="16">

    <div class="opcoes">
        <label><input type="checkbox" id="maiusculas" checked> Maiúsculas</label>
        <label><input type="checkbox" id="minusculas" checked> Minúsculas</label>
        <label><input type="checkbox" id="numeros" checked> Números</label>
        <label><input type="checkbox" id="simbolos" checked> Símbolos</label>
    </div>

    <button id="gerar">Gerar Senha</button>

    <div class="forca">
        <p id="textoForca">Força: Forte</p>
        <div class="barra">
            <div id="nivel"></div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
